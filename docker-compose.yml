services:
  postgres:
    image: postgres:15-alpine
    container_name: mercadopago_inventory_postgres
    restart: always
    environment:
      POSTGRES_USER: mercadopago_user
      POSTGRES_PASSWORD: mercadopago_password
      POSTGRES_DB: mercadopago_inventory_db
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
